name: Auto Sync Football Data

on:
  schedule:
    # GitHub scheduled jobs can queue or skip at busy minute marks; offset the run.
    - cron: '2-59/5 * * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sync.yml'
      - 'scripts/syncData.cjs'
      - 'scripts/checkSportteryOdds.cjs'
      - 'scripts/validateData.cjs'
      - 'public/data/**'
      - 'public/matches.json'
      - 'public/odds-history.json'
  workflow_dispatch:
    inputs:
      source:
        description: Trigger source, such as cloudflare-cron or manual.
        required: false
        default: manual

concurrency:
  group: football-data-sync
  cancel-in-progress: true

jobs:
  sync-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # 赋予 actions 写入与推送代码的权限
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Supplemental Signal Sync
        continue-on-error: true
        env:
          ENABLE_API_FOOTBALL_SYNC: ${{ vars.ENABLE_API_FOOTBALL_SYNC || '0' }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_MAX_CALLS_PER_SYNC: ${{ vars.API_FOOTBALL_MAX_CALLS_PER_SYNC || '35' }}
          API_FOOTBALL_INJURY_REFRESH_MINUTES: ${{ vars.API_FOOTBALL_INJURY_REFRESH_MINUTES || '360' }}
          API_FOOTBALL_ODDS_REFRESH_MINUTES: ${{ vars.API_FOOTBALL_ODDS_REFRESH_MINUTES || '180' }}
          API_FOOTBALL_LINEUP_REFRESH_MINUTES: ${{ vars.API_FOOTBALL_LINEUP_REFRESH_MINUTES || '20' }}
        run: |
          npm run sync:500
          npm run sync:500:details
          npm run sync:weather
          npm run sync:api-football

      - name: Run Data Scraper & Predictor
        env:
          MATCH_WINDOW_BACK_DAYS: 365
          SPORTTERY_PAGE_DEPTH: 120
          ODDS_HISTORY_RETENTION_DAYS: 365
          ODDS_HISTORY_BUCKET_MINUTES: 5
          SYNC_WORKFLOW_MINUTES: 5
          PAGE_POLL_SECONDS: 30
        run: node scripts/syncData.cjs

      - name: Validate Prediction Data
        run: npm run validate:data

      - name: Verify Official Sporttery Odds
        continue-on-error: true
        env:
          ODDS_VERIFY_MODE: warn
        run: npm run verify:odds

      - name: Commit & Push Changes to Main
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add public/matches.json public/odds-history.json public/data
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: auto sync sports predictions matches [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "No changes in predictions data."
          fi

      - name: Build Project
        env:
          VITE_BASE_PATH: /football-predict/
          VITE_DATA_API_BASE: ${{ vars.DATA_API_BASE }}
        run: npm run build

      - name: Prepare SPA Fallback
        run: cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
