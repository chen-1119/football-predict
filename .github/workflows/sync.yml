name: Auto Sync Football Data

on:
  schedule:
    - cron: '*/5 * * * *' # 每 5 分钟自动同步一次；GitHub 可能会有排队延迟
  workflow_dispatch: # 支持在 GitHub 控制台手动点击触发

concurrency:
  group: football-data-sync
  cancel-in-progress: true

jobs:
  sync-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # 赋予 actions 写入与推送代码的权限
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Data Scraper & Predictor
        env:
          MATCH_WINDOW_BACK_DAYS: 365
          SPORTTERY_PAGE_DEPTH: 120
          ODDS_HISTORY_RETENTION_DAYS: 365
          ODDS_HISTORY_BUCKET_MINUTES: 5
          SYNC_WORKFLOW_MINUTES: 5
          PAGE_POLL_SECONDS: 60
        run: node scripts/syncData.cjs

      - name: Validate Prediction Data
        run: npm run validate:data

      - name: Verify Official Sporttery Odds
        run: npm run verify:odds

      - name: Commit & Push Changes to Main
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add public/matches.json public/odds-history.json public/data
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: auto sync sports predictions matches [skip ci]"
            git push
          else
            echo "No changes in predictions data."
          fi

      - name: Build Project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
