name: Deploy Cloudflare Sync Worker

on:
  workflow_dispatch:

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Validate Required Secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SYNC_WORKER_GITHUB_TOKEN: ${{ secrets.SYNC_WORKER_GITHUB_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "$SYNC_WORKER_GITHUB_TOKEN" || (echo "Missing SYNC_WORKER_GITHUB_TOKEN" && exit 1)

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config cloudflare/sync-trigger/wrangler.jsonc

      - name: Upload Worker Secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SYNC_WORKER_GITHUB_TOKEN: ${{ secrets.SYNC_WORKER_GITHUB_TOKEN }}
          SYNC_WORKER_MANUAL_TOKEN: ${{ secrets.SYNC_WORKER_MANUAL_TOKEN }}
        run: |
          printf '%s' "$SYNC_WORKER_GITHUB_TOKEN" | npx wrangler secret put GITHUB_TOKEN --config cloudflare/sync-trigger/wrangler.jsonc
          if [ -n "$SYNC_WORKER_MANUAL_TOKEN" ]; then
            printf '%s' "$SYNC_WORKER_MANUAL_TOKEN" | npx wrangler secret put MANUAL_TRIGGER_TOKEN --config cloudflare/sync-trigger/wrangler.jsonc
          fi
